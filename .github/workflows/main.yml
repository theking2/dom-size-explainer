name: Update README with Latest Release Assets

on:
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Get latest release
        id: get_release
        uses: cardinalby/git-get-release-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          latest: true

      - name: Generate assets table
        id: generate_table
        run: |
          # Create release section content
          cat > release_section.md << EOF
          ## Latest Release: ${{ steps.get_release.outputs.name }} (${{ steps.get_release.outputs.tag_name }})
          
          **Published:** $(date -d "${{ steps.get_release.outputs.published_at }}" +"%B %d, %Y")
          
          ### 📥 Download Assets
          
          $(echo '${{ steps.get_release.outputs.assets }}' | jq -r '.[] | "- [\(.name)](\(.browser_download_url))"')
          
          🔗 [View full release on GitHub](${{ steps.get_release.outputs.html_url }})
          EOF

      - name: Update README
        run: |
          # Check if markers exist, if not add them
          if ! grep -q "<!-- LATEST_RELEASE_START -->" README.md; then
            echo -e "\n<!-- LATEST_RELEASE_START -->\n<!-- LATEST_RELEASE_END -->" >> README.md
          fi
          
          # Create updated README
          awk '
            /<!-- LATEST_RELEASE_START -->/ {
              print
              while ((getline line < "release_section.md") > 0) print line
              next
            }
            /<!-- LATEST_RELEASE_END -->/ { print; next }
            { print }
          ' README.md > README.tmp
          
          mv README.tmp README.md
          
          # Show the changes
          echo "Changes made to README.md:"
          git diff README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update README with latest release assets"
          title: "Update README with latest release ${{ steps.get_release.outputs.tag_name }}"
          body: |
            This PR updates the README with the latest release information.
            
            ## Release Details
            - **Version:** ${{ steps.get_release.outputs.tag_name }}
            - **Name:** ${{ steps.get_release.outputs.name }}
            - **Published:** ${{ steps.get_release.outputs.published_at }}
            
            The README has been updated with download links for all release assets.
            
            Auto-generated by GitHub Actions workflow.
          branch: "update-readme-release-${{ steps.get_release.outputs.tag_name }}"
          base: ${{ github.event.repository.default_branch }}
          labels: documentation, automated-pr
          delete-branch: true
